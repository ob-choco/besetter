<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Besetter</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ title }} | Besetter">
    <meta property="og:description" content="{{ description }}">
    <meta property="og:image" content="{{ image_url }}">
    <meta property="og:url" content="{{ share_url }}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ title }} | Besetter">
    <meta name="twitter:description" content="{{ description }}">
    <meta name="twitter:image" content="{{ image_url }}">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 16px;
        }
        p {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 24px;
        }
        .open-app-button {
            display: inline-block;
            padding: 14px 32px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 12px;
        }
        .store-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .store-button {
            display: inline-block;
            padding: 12px 24px;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
        .pending-badge {
            display: inline-block;
            margin-left: 8px;
            padding: 2px 10px;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            background: rgba(255,255,255,0.85);
            border-radius: 999px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ title }}{% if place_status == "pending" %}<span class="pending-badge">검수중</span>{% endif %}</h1>
        <p>{{ description }}</p>
        <a href="{{ deep_link_url }}" class="open-app-button">앱에서 열기</a>
        <p>앱이 설치되어 있지 않다면 아래에서 다운로드하세요.</p>
        <div class="store-buttons">
            <a href="{{ app_store_url }}" class="store-button">App Store에서 다운로드</a>
            <a href="{{ play_store_url }}" class="store-button">Google Play에서 다운로드</a>
        </div>
    </div>

    <script>
        (function() {
            var deepLinkUrl = "{{ deep_link_url }}";
            var key = 'dl_' + deepLinkUrl;
            if (sessionStorage.getItem(key)) return;
            sessionStorage.setItem(key, '1');
            window.location.href = deepLinkUrl;
        })();
    </script>
</body>
</html>
